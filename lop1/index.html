<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>HK1 - Tin học</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f8fafc;
}

/* ===== HEADER ===== */
header{
  background:linear-gradient(135deg,#e0f2fe,#fefce8);
  padding:30px 15px;
  text-align:center;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  box-shadow:0 6px 12px rgba(0,0,0,0.1);
}
header h1{
  margin:0;
  font-size:30px;
  color:#0f172a;
}
header p{
  margin-top:8px;
  font-weight:bold;
  color:#334155;
}

/* ===== MAIN ===== */
main{
  padding:30px 20px;
  max-width:1200px;
  margin:auto;
}

/* ===== GRID ===== */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
  margin-bottom:40px;
}

/* ===== CARD ===== */
.card{
  background:white;
  border-radius:24px;
  padding:36px 22px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
  cursor:pointer;
  transition:transform 0.2s;
}
.card:hover{transform:scale(1.05);}

.icon{
  font-size:48px;
  margin-bottom:12px;
}
.card h2{
  font-size:20px;
  color:#0f172a;
}

/* ===== MÀU PHÂN BIỆT ===== */
.bai{background:#e0f2fe;}
.bp{background:#dcfce7;}

/* ===== TIÊU ĐỀ KHU ===== */
.section-title{
  font-size:22px;
  margin:10px 0 20px;
  color:#020617;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <h1>💻 HỌC KÌ 2 – TIN HỌC</h1>
  <p>Danh sách bài học</p>
</header>

<main>

<!-- ===== KHU VỰC 1 ===== -->
<div class="section-title">📘 Khu vực 1</div>
<div class="container">

  <div class="card bai" data-ready="true" data-link="scorm/ONK2-CN3(2526)BP/res/index.html">
    <div class="icon">📘</div>
    <h2>HK2<br>Ôn tập - CN3</h2>
  </div>

  <div class="card bai" data-ready="true" data-link="scorm/ONK2-CN4(2526)BP/res/index.html">
    <div class="icon">📘</div>
    <h2>HK2<br>Ôn tập - CN4</h2>
  </div>

   <div class="card bai" data-ready="true" data-link="scorm/ONK2-CN5(2526)BP/res/index.html">
    <div class="icon">📘</div>
    <h2>HK2<br>Ôn tập - CN5</h2>
  </div>

  <div class="card bai" data-ready="true" data-link="scorm/ONK2-TH4(2526)BP/res/index.html">
    <div class="icon">📘</div>
    <h2>HK2<br>Ôn tập - TH4</h2>
  </div>

   <div class="card bai" data-ready="true" data-link="scorm/ONK2-TH5(2526)BP/res/index.html">
    <div class="icon">📘</div>
    <h2>HK2<br>Ôn tập - TH5</h2>
  </div>

</div>

<!-- ===== KHU VỰC 2 – BP ===== -->
<div class="section-title">🧠 Khu vực 2 – BP</div>
<div class="container">

  <div class="card bp" data-ready="true" data-link="scorm/CK2-TH3(2025-2026)BP/index.html">
    <div class="icon">🧠</div>
    <h2>HK2<br>Tin học 3 (BP)</h2>
  </div>

  <div class="card bp" data-ready="true" data-link="scorm/CK2-TH4(2025-2026)BP/index.html">
    <div class="icon">🧠</div>
    <h2>HK2<br>Tin học 4 (BP)</h2>
  </div>

  <div class="card bp" data-ready="true" data-link="scorm/CK2-TH5(2025-2026)BP/index.html">
    <div class="icon">🧠</div>
    <h2>HK2<br>Tin học 5 (BP)</h2>
  </div>

</div>

</main>

<script>
/* LOGIC CLICK – GỌN, ỔN ĐỊNH */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click", function(){
    if(this.dataset.ready === "true"){
      window.location.href = this.dataset.link;
    }
  });
});
</script>

</body>
</html>
